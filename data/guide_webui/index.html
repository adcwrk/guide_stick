<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GUIDE WebUI</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #101418; color: #eef3f7; }
    header { padding: 18px 24px; border-bottom: 1px solid #29313a; display: flex; justify-content: space-between; gap: 16px; align-items: center; }
    h1 { margin: 0; font-size: 22px; letter-spacing: 0; }
    main { max-width: 980px; margin: 0 auto; padding: 20px; }
    .toolbar { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 16px; align-items: center; }
    select, textarea, button { font: inherit; border-radius: 6px; border: 1px solid #394552; background: #151b22; color: #f4f7fa; }
    select { padding: 10px 12px; min-width: 220px; }
    button { padding: 10px 14px; cursor: pointer; background: #1f6feb; border-color: #2b7fff; }
    button:disabled { opacity: .55; cursor: not-allowed; }
    textarea { width: 100%; min-height: 110px; box-sizing: border-box; padding: 12px; resize: vertical; }
    .panel { border: 1px solid #29313a; background: #151b22; border-radius: 8px; padding: 16px; margin: 14px 0; }
    .answer { white-space: pre-wrap; line-height: 1.5; }
    .status { color: #a8b3bd; font-size: 14px; }
    .warn { color: #ffd479; }
    code { background: #0b0f13; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <header>
    <h1>GUIDE WebUI</h1>
    <div class="status" id="status">Checking Ollama...</div>
  </header>
  <main>
    <div class="toolbar">
      <label>
        Model
        <select id="model"></select>
      </label>
      <button id="refresh">Refresh Models</button>
    </div>
    <textarea id="prompt" placeholder="Ask GUIDE something..."></textarea>
    <div style="margin-top: 12px;">
      <button id="send">Send</button>
    </div>
    <section class="panel">
      <div class="answer" id="answer">No response yet.</div>
    </section>
    <section class="panel status">
      Ollama backend: <code>http://127.0.0.1:11434</code><br>
      If no models appear, pull one from the USB terminal:
      <code>OLLAMA_MODELS=/mnt/usb/GUIDE/ollama/data ./ollama/ollama pull llama3.2:3b</code>
    </section>
  </main>
  <script>
    const modelSelect = document.getElementById('model');
    const statusEl = document.getElementById('status');
    const answerEl = document.getElementById('answer');
    const promptEl = document.getElementById('prompt');
    const sendBtn = document.getElementById('send');

    async function loadModels() {
      statusEl.textContent = 'Checking Ollama...';
      modelSelect.innerHTML = '';
      try {
        const res = await fetch('/api/tags');
        const data = await res.json();
        const models = data.models || [];
        if (!models.length) {
          modelSelect.innerHTML = '<option value="llama3.2:3b">llama3.2:3b (not installed)</option>';
          statusEl.innerHTML = '<span class="warn">Ollama is running, but no models are installed.</span>';
          return;
        }
        for (const model of models) {
          const opt = document.createElement('option');
          opt.value = model.name;
          opt.textContent = model.name;
          modelSelect.appendChild(opt);
        }
        statusEl.textContent = `${models.length} model(s) available`;
      } catch (err) {
        statusEl.innerHTML = '<span class="warn">Ollama is not reachable.</span>';
      }
    }

    async function sendMessage() {
      const message = promptEl.value.trim();
      if (!message) return;
      sendBtn.disabled = true;
      answerEl.textContent = 'Thinking...';
      try {
        const res = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ model: modelSelect.value, message })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        answerEl.textContent = data.message?.content || JSON.stringify(data, null, 2);
      } catch (err) {
        answerEl.textContent = `Error: ${err.message}`;
      } finally {
        sendBtn.disabled = false;
      }
    }

    document.getElementById('refresh').addEventListener('click', loadModels);
    sendBtn.addEventListener('click', sendMessage);
    loadModels();
  </script>
</body>
</html>
